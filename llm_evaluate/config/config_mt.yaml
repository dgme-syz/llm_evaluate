evaluate:
  val_size: 4096
  num_proc: null
  metrics:
    # - sentenceBLEU
    - BLEU
    # - chrFpp
    # - spBLEU
    - comet-22
    - cometkiwi
    - BLEURT
    # - xcomet-xl
  metrics_args:
    ignore_columns: [0]
  eval_func: recheck
  eval_func_args:
    check_num: 1
    use_thinking: false
    use_thinking_prompts: false
  merge_strategy: total

use_server: false

llm:
  prompt_template: qwen_chat_mt
  exp_tag: default
  vllm:
    model: /home/nfs05/shenyz/models/Qwen3-0.6B
    tokenizer: /home/nfs05/shenyz/models/Qwen3-0.6B
    trust_remote_code: true
    dtype: bfloat16
    gpu_memory_utilization: 0.7
    tensor_parallel_size: 4
    seed: 42
    enable_chunked_prefill: false 
    enable_prefix_caching: false

tokenize_args:
  enable_thinking: false

server: {}

generate_params:
  offline:
    use_beam_search: false
    sampling_params:
      max_tokens: 512
      # top_k: 20
      # top_p: 0.95
      temperature: 0.6
      # repetition_penalty: 1.0
      seed: 42
      n: 1
    beam_search_params:
      beam_width: 4
      max_tokens: 1024
  online: 
    max_tokens: 512
    


save_outputs: true # save format: jsonl
outputs_dir: ./outputs/main/

